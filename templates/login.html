{% extends 'base.html' %}
{% block title %}Sign In{% endblock %}

{% block head %}
<style>
body{background:var(--bg);display:flex;flex-direction:column;min-height:100vh;}
.auth-bg{position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 20%,rgba(200,164,90,.07) 0%,transparent 60%);pointer-events:none;}
.auth-wrap{flex:1;display:flex;flex-direction:column;padding:72px 28px 40px;}
.auth-head{text-align:center;margin-bottom:44px;}
.auth-mark{width:84px;height:84px;object-fit:contain;margin:0 auto 14px;display:block;}
.auth-logo{font-family:'Arpubes',sans-serif;font-size:40px;letter-spacing:-3px;color:var(--black);line-height:1;}
.auth-tag{font-size:12px;color:var(--sub);margin-top:12px;letter-spacing:.5px;}
.auth-form{flex:1;}
.auth-foot{text-align:center;padding-top:24px;}
.auth-foot-txt{font-size:12px;color:var(--sub);}
.auth-foot-lnk{color:var(--gold);font-weight:700;text-decoration:none;}
.social-btn{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-xl);padding:15px 20px;display:flex;align-items:center;justify-content:center;gap:10px;color:var(--black);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:10px;transition:border-color .15s;}
.social-btn:hover{border-color:var(--gold-b);}
.social-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.75;}
.forgot{text-align:right;margin-top:-8px;margin-bottom:16px;}
.forgot a{font-size:11px;color:var(--sub);text-decoration:none;}
</style>
{% endblock %}

{% block content %}
<div class="auth-bg"></div>
<div class="auth-wrap">
  <div class="auth-head">
    <img src="/static/twin_logo.png" class="auth-mark" alt="TWIN" onerror="this.style.display='none'">
    <div class="auth-logo">TWIN</div>
    <div class="auth-tag">Your digital twin</div>
  </div>

  <div class="auth-form">
    {% if error %}<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#EF4444;font-size:12px;padding:11px 14px;border-radius:12px;margin-bottom:14px;text-align:center;">{{ error }}</div>{% endif %}
    <form method="POST" action="/login" novalidate>
      <div class="form-group">
        <label class="form-label">Account</label>
        <input type="text" class="form-input" name="email" placeholder="Email or username" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" name="password" placeholder="Enter your password" autocomplete="current-password">
      </div>
      <div class="forgot"><a href="/forgot">Forgot password?</a></div>
      <button type="submit" class="btn btn-gold btn-full mb-3" style="border-radius:var(--r-xl);">
        <i data-lucide="arrow-right"></i>
        SIGN IN
      </button>
    </form>

    <div class="divider-lbl mb-3" style="margin:0 0 12px;">or continue with</div>

    <button class="social-btn" onclick="authSoon('Google sign-in')">
      <svg viewBox="0 0 24 24"><path d="M20.283 10.356h-8.327v3.451h4.792c-.446 2.193-2.313 3.453-4.792 3.453a5.27 5.27 0 0 1-5.279-5.28 5.27 5.27 0 0 1 5.279-5.279c1.259 0 2.397.447 3.29 1.178l2.6-2.599c-1.584-1.381-3.615-2.233-5.89-2.233a8.908 8.908 0 0 0-8.934 8.934 8.908 8.908 0 0 0 8.934 8.934c4.467 0 8.529-3.249 8.529-8.934 0-.528-.081-1.097-.202-1.625z" fill="currentColor" stroke="none"/></svg>
      Continue with Google
    </button>
    <button class="social-btn" onclick="authSoon('Phone sign-in')">
      <i data-lucide="smartphone"></i>
      Continue with Phone
    </button>
  </div>

  <div class="auth-foot">
    <span class="auth-foot-txt">New to TWIN? </span>
    <a href="/signup" class="auth-foot-lnk">Create account</a>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function authSoon(name){
  let t=document.getElementById('authToast');
  if(!t){
    t=document.createElement('div');
    t.id='authToast';
    t.style.cssText='position:fixed;left:50%;bottom:90px;transform:translateX(-50%);max-width:330px;width:86%;background:var(--card);border:1px solid var(--gold-b);color:var(--black);font-size:12px;line-height:1.5;padding:13px 16px;border-radius:14px;z-index:9999;text-align:center;box-shadow:var(--sh-md);transition:opacity .3s;pointer-events:none;';
    document.body.appendChild(t);
  }
  t.textContent = name + ' is coming soon — use email & password for now.';
  t.style.opacity='1';
  clearTimeout(window._authT);
  window._authT=setTimeout(()=>{t.style.opacity='0';},3200);
}
</script>
{% endblock %}
